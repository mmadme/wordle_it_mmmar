name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  PAGES_API_BASE: ${{ secrets.PAGES_API_BASE_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify Python files
        run: python3 -m py_compile build.py build_github_pages.py serve_local.py report_playtest.py

      - name: Build GitHub Pages package
        run: python3 build_github_pages.py --api-base "${PAGES_API_BASE}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: github_pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
